name: Refresh calendar data
# Pulls the Operations Calendar Report from Smartsheet and commits a static
# data.json file to the repo. The TV calendars read this same-origin file
# (Smartsheet API does not support browser CORS, so we cannot call it
# directly from the client-side JS).
#
# Triggers: every 5 min on cron, on every push to main, or manually via
# the Actions tab.

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}
  push:
    branches: [ main ]
    paths-ignore:
      - 'data.json'

permissions:
  contents: write

# Cancel any older queued/running run when a new one starts so we never push
# stale data on top of newer data.
concurrency:
  group: refresh-data
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch report from Smartsheet API
        env:
          TOKEN: 'p24Cgh1izpdYeclFRk4gE6m9nCuEoBW5Nkywe'
          REPORT_ID: '3854855551537028'
        run: |
          curl -sS -H "Authorization: Bearer $TOKEN" \
            "https://api.smartsheet.com/2.0/reports/${REPORT_ID}?pageSize=10000" \
            -o raw.json
          echo "raw.json size: $(wc -c < raw.json) bytes"

      - name: Transform to data.json
        run: |
          python3 .github/scripts/transform.py < raw.json > data.json.new
          mv data.json.new data.json
          echo "data.json bytes: $(wc -c < data.json)"
          echo "events: $(python3 -c 'import json,sys;print(len(json.load(open("data.json"))["events"]))')"

      - name: Commit and push (with retry on race)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "No changes — skipping commit"
            exit 0
          fi
          git commit -m "Refresh data.json from Operations Calendar Report ($(date -u +%Y-%m-%dT%H:%MZ))"
          # Retry up to 3 times: pull rebase + push, in case another run pushed
          # while we were running.
          for attempt in 1 2 3; do
            if git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push rejected on attempt $attempt — fetching + rebasing..."
            git fetch origin main
            git rebase origin/main || git rebase --abort
            sleep $((attempt * 2))
          done
          echo "Push failed after 3 attempts"
          exit 1
